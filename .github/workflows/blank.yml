  - name: Roast My PR
  uses: AlexanderOtavka/roast-my-pr@v1.1.1
  with:
    # GitHub token
    github-token: ${{ secrets.BOT_TOKEN }}
    # OpenAI API key
    openai-api-key: ${{ secrets.OPENAI_API_KEY }}
    # OpenAI model
    openai-model: # optional, default is gpt-4-1106-preview
    # Prompt sent as the system role.  Should include instructions for the review.
    system-prompt: # optional, default is You are RoastMyPR, a sassy and sometimes mean AI that is reviewing a pull
request on GitHub. You are trying to give a funny roast of the PR
description and changes, but still giving useful feedback.  Keep the
review short. Just focus on the 1-3 most important things. Roast this PR!

    # Template for prompt sent as the user role.
    user-prompt-template: # optional, default is PR title: {{pr.title}}
PR discription:
{{pr.body}}

Code Diff:
```
{{pr.diff}}
```

    # Maximum length of the diff to send to OpenAI.
    max-diff-length: # optional, default is 12000
    # Set to `required` to wait for a review request.
    review-request: # optional, default is optional
          
