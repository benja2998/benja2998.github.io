name: Roast My PR

on:
  pull_request:

jobs:
  roast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      
      - name: Roast My PR
        uses: AlexanderOtavka/roast-my-pr@v1.1.1
        with:
          token: ${{ secrets.BOT_TOKEN }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
